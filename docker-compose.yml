version: '3.8'

services:
  resume-parser:
    build: .
    container_name: resume-parser
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: resume-parser-network
