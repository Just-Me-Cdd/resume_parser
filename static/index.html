<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历解析工具 - 智能简历处理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --primary-light: #818CF8;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F1F5F9;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-tertiary: #94A3B8;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 0 80px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 600px;
        }
        
        .main-container {
            max-width: 1200px;
            margin: -60px auto 40px;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }
        
        .upload-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 32px;
            margin-bottom: 32px;
        }
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: var(--bg-tertiary);
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }
        
        .upload-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.3);
        }
        
        .upload-zone h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .upload-zone p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
        }
        
        .file-input {
            display: none;
        }
        
        .options-bar {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .option-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: white;
            cursor: pointer;
            outline: none;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title h2 {
            font-size: 22px;
            font-weight: 700;
        }
        
        .badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .resume-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }
        
        .resume-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease;
        }
        
        .resume-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-header {
            background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .file-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        .file-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .file-info span {
            font-size: 13px;
            color: var(--text-tertiary);
        }
        
        .card-body {
            padding: 24px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .section-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .section-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .section-tag {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .section-tag.education { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        .section-tag.experience { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
        .section-tag.skills { background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%); }
        
        .section-content {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast {
            background: white;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            min-width: 300px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        
        .search-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .search-bar {
            display: flex;
            gap: 12px;
        }
        
        .search-input-wrapper {
            flex: 1;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            outline: none;
        }
        
        .search-input:focus { border-color: var(--primary); }
        
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }
        
        .search-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }
        
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-tertiary);
        }
        
        @media (max-width: 768px) {
            .resume-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-wrap: wrap; }
            .options-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📋</div>
                <h1>简历解析工具</h1>
            </div>
            <p>智能简历批量处理平台 - 支持图片、PDF、Word格式，自动提取结构化信息</p>
        </div>
    </header>
    
    <div class="main-container">
        <div class="upload-card">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📤</div>
                <h3>拖拽简历文件到这里</h3>
                <p>或点击下方按钮选择文件</p>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    选择文件
                </button>
                <input type="file" id="fileInput" class="file-input" multiple accept=".jpg,.jpeg,.png,.pdf,.docx,.doc">
                <p class="upload-hint">支持: JPG, PNG, PDF, DOCX (单个文件最大 10MB)</p>
            </div>
            
            <div class="options-bar">
                <div class="option-group">
                    <span class="option-label">语言:</span>
                    <select class="option-select" id="langSelect">
                        <option value="ch">中文</option>
                        <option value="en">英文</option>
                        <option value="chinese_cht">繁体中文</option>
                    </select>
                </div>
                <div class="option-group">
                    <span class="option-label">解析模式:</span>
                    <select class="option-select" id="modeSelect">
                        <option value="text">文本模式</option>
                        <option value="ocr">OCR模式</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索简历内容，如: Python开发经验">
                </div>
                <button class="search-btn" onclick="searchResumes()">搜索</button>
            </div>
        </div>
        
        <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
            <div class="section-title">
                <h2>已解析简历</h2>
                <span class="badge" id="resumeCount">0</span>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <span style="font-size:24px;">📄</span>
                <div>
                    <div class="stat-value" id="totalResumes">0</div>
                    <div class="stat-label">简历数</div>
                </div>
            </div>
            <div class="stat-item">
                <span style="font-size:24px;">📑</span>
                <div>
                    <div class="stat-value" id="totalSections">0</div>
                    <div class="stat-label">章节数</div>
                </div>
            </div>
        </div>
        
        <div class="resume-grid" id="resumeGrid">
            <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:80px 40px;background:var(--bg-secondary);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);">
                <div style="font-size:48px;margin-bottom:16px;">📭</div>
                <h3 style="font-size:20px;font-weight:600;margin-bottom:8px;">暂无简历</h3>
                <p style="color:var(--text-secondary);">上传简历文件开始解析</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        let resumes = [];
        
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toastContainer = document.getElementById('toastContainer');
        const resumeGrid = document.getElementById('resumeGrid');
        
        // 拖拽上传
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });
        
        async function handleFiles(files) {
            if (files.length === 0) return;
            
            showLoading();
            
            const lang = document.getElementById('langSelect').value;
            const mode = document.getElementById('modeSelect').value;
            const formData = new FormData();
            
            for (let file of files) {
                formData.append('files', file);
            }
            
            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.results) {
                    for (let r of result.results) {
                        if (r.success) {
                            showToast('success', `${r.file_name} 解析成功`);
                            await loadStats();
                        } else {
                            showToast('error', `${r.file_name}: ${r.error}`);
                        }
                    }
                    await loadResumes();
                }
            } catch (error) {
                showToast('error', '上传失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        async function loadResumes() {
            try {
                const response = await fetch(`${API_BASE}/resumes`);
                const data = await response.json();
                document.getElementById('resumeCount').textContent = data.total_sections || 0;
            } catch (error) {
                console.error('加载简历列表失败:', error);
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                document.getElementById('totalSections').textContent = data.total_sections || 0;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        async function searchResumes() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('error', '请输入搜索关键词');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/rag/search?q=${encodeURIComponent(query)}&top_k=10`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    let html = '';
                    for (let r of data.results) {
                        html += `
                            <div class="resume-card">
                                <div class="card-header">
                                    <div class="card-title">
                                        <div class="file-icon">🔍</div>
                                        <div class="file-info">
                                            <h3>${r.title}</h3>
                                            <span>匹配度: ${(r.score * 100).toFixed(1)}%</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="section-content">${r.content}</div>
                                </div>
                            </div>
                        `;
                    }
                    resumeGrid.innerHTML = html;
                    showToast('success', `找到 ${data.results.length} 个匹配结果`);
                } else {
                    resumeGrid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary);">
                            未找到匹配结果
                        </div>
                    `;
                }
            } catch (error) {
                showToast('error', '搜索失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        function showToast(type, message) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
                <span class="toast-message">${message}</span>
            `;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchResumes();
        });
        
        // 初始化
        loadStats();
        loadResumes();
    </script>
</body>
</html>
